<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Explorer</title>
    <meta name="description" content="Explore, filter, and share the latest Google Cloud BigQuery release notes and updates.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="shortcut icon" href="https://ssl.gstatic.com/images/branding/product/2x/bigquery_64dp.png" type="image/x-icon">
</head>
<body>
    <!-- Background Gradient Decorative Blobs -->
    <div class="blob-bg blob-1"></div>
    <div class="blob-bg blob-2"></div>
    <div class="blob-bg blob-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="url(#logo-grad)"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3b82f6"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="header-title-group">
                    <h1 class="gradient-text">BigQuery Release Explorer</h1>
                    <p class="subtitle">Track and share the latest Google Cloud BigQuery updates</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="last-updated-text" id="last-updated-label">Last fetched: --:--:--</span>
                <button class="btn btn-primary btn-refresh" id="btn-refresh" title="Refresh Release Notes">
                    <svg class="icon-refresh" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Stats Overview Panel -->
        <section class="stats-panel" id="stats-panel">
            <div class="stat-card">
                <div class="stat-info">
                    <span class="stat-label">Total Updates</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-icon bg-blue-glow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <span class="stat-label">Features</span>
                    <span class="stat-value text-emerald" id="stat-features">0</span>
                </div>
                <div class="stat-icon bg-emerald-glow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <span class="stat-label">Fixes & Resolved</span>
                    <span class="stat-value text-cyan" id="stat-fixes">0</span>
                </div>
                <div class="stat-icon bg-cyan-glow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 11.08 22 12 12 22 2 12 12 2 22 11.08"></polyline>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <span class="stat-label">Deprecations</span>
                    <span class="stat-value text-orange" id="stat-deprecations">0</span>
                </div>
                <div class="stat-icon bg-orange-glow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Filters & Search Toolbar -->
        <div class="toolbar-panel">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search updates (e.g. Gemini, SQL, partition)..." autocomplete="off">
                <button class="clear-search-btn" id="btn-clear-search" style="display: none;">&times;</button>
            </div>
            <div class="filter-badges">
                <button class="filter-badge active" data-filter="all">All Updates</button>
                <button class="filter-badge" data-filter="feature">Features</button>
                <button class="filter-badge" data-filter="fixed">Fixes</button>
                <button class="filter-badge" data-filter="deprecated">Deprecations</button>
                <button class="filter-badge" data-filter="other">Other</button>
            </div>
        </div>

        <!-- Release Notes Feed Grid -->
        <main class="feed-grid" id="feed-container">
            <!-- Skeleton items while loading -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </main>
    </div>

    <!-- Tweet Composer Modal -->
    <div class="modal-overlay" id="tweet-modal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="modal-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </div>
                    <h3>Compose Tweet</h3>
                </div>
                <button class="modal-close-btn" id="btn-close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="composer-source-info">
                    <span class="source-tag" id="composer-date">June 15, 2026</span>
                    <span class="source-badge" id="composer-badge">Feature</span>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="tweet-textarea" rows="6" maxlength="280" placeholder="What's happening?"></textarea>
                </div>
                <div class="composer-footer">
                    <div class="char-counter-container">
                        <svg class="progress-ring" width="36" height="36">
                            <circle class="progress-ring-bg" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="transparent" r="14" cx="18" cy="18"/>
                            <circle class="progress-ring-circle" id="progress-circle" stroke="#3b82f6" stroke-width="3" fill="transparent" r="14" cx="18" cy="18"/>
                        </svg>
                        <span class="char-count-number" id="char-count">280</span>
                    </div>
                    <div class="composer-buttons">
                        <button class="btn btn-secondary" id="btn-copy-tweet">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy Draft
                        </button>
                        <button class="btn btn-primary" id="btn-publish-tweet">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            Tweet
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- JS Logic -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
